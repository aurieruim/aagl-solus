name       : an-anime-game-launcher
version    : 3.18.0
release    : 1
license    : GPL-3.0
component  : games
summary    : Anime game launcher
source :
    - https://github.com/aurieruim/aagl-solus/releases/download/3.18.0/source.tar.gz : 02c08efad05d0cac3a376e2c6af20cbc5dd5e8c33e3e74b4696a19cdee5053d0
description: |
     An Anime Game launcher for Linux with telemetry disabling.

rundeps:
    - libadwaita

build      : |
    echo "nothing to build"

install    : |
    install -Dm755 files/anime-game-launcher $installdir/usr/bin/anime-game-launcher

    install -Dm644 files/an-anime-game-launcher.desktop \
        $installdir/usr/share/applications/an-anime-game-launcher.desktop

    install -Dm644 files/moe.launcher.an-anime-game-launcher.png \
        $installdir/usr/share/icons/hicolor/256x256/apps/moe.launcher.an-anime-game-launcher.png
